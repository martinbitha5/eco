[project]
name = "scoring-engine"
version = "0.0.1"
description = "ScoreCongo credit scoring microservice"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "httpx>=0.26.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = ["ruff>=0.1.0"]

[tool.ruff]
line-length = 100
target-version = "py311"
